<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff,#ffe4ec);
height:100vh;
}

/* pantalla inicial */

#inicio{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#inicio h1{
color:white;
font-size:40px;
text-shadow:0 4px 15px rgba(0,0,0,0.3);
margin-bottom:30px;
}

#boton{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* mensajes */

.mensaje{
position:absolute;
bottom:-80px;
padding:15px 25px;
border-radius:30px;
background:white;
font-size:20px;
color:#ff4d6d;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:flotar 9s linear forwards;
}

@keyframes flotar{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

/* corazones */

.corazon{
position:absolute;
bottom:-30px;
font-size:28px;
animation:subir 7s linear forwards;
}

@keyframes subir{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div id="inicio">
<h1>Tengo algo bonito para ti ❤️</h1>
<button id="boton" onclick="iniciar()">Presiona aquí</button>
</div>

<script>

const mensajes=[
"Me gustas mucho Karlita ❣️",
"Tus ojitos me gustan mucho 🥰",
"Tienes una sonrisa que ilumina todo ❣️",
"Eres alguien muy especial para mí ❣️",
"Me encanta pasar tiempo contigo 🥰",
"Me encanta tu forma de ser ❣️",
"Te amitoooooooooo ❣️",
"Haces mis dias felices 🥰",
"Me encanta cuando hablo contigo 🥰",
"Siempre me sacas una sonrisa ❣️",
"Pensar en ti me pone feliz 🥰",
"Me gusta mucho tu forma de reír ❣️",
"Contigo todo se siente más bonito 🥰",
"Eres alguien muy importante para mí ❣️",
"Me haces sentir muy feliz 🥰",
"Tu forma de ser me encanta ❣️",
"Siempre es bonito platicar contigo 🥰",
"Tu sonrisa es de mis cosas favoritas ❣️",
"Me gusta mucho estar contigo 🥰",
"Siempre alegras mi día ❣️",
"Tienes algo que me encanta 🥰",
"Cuando hablo contigo se me olvida todo ❣️",
"Eres muy especial para mí 🥰"
];

function iniciar(){

document.getElementById("inicio").style.display="none";

setInterval(crearMensaje,1400);
setInterval(crearCorazon,500);

}

function crearMensaje(){

const mensaje=document.createElement("div");

mensaje.className="mensaje";

mensaje.innerText=mensajes[Math.floor(Math.random()*mensajes.length)];

mensaje.style.left=Math.random()*85+"vw";

document.body.appendChild(mensaje);

setTimeout(()=>{
mensaje.remove();
},9000);

}

function crearCorazon(){

const corazon=document.createElement("div");

corazon.className="corazon";

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},7000);

}

</script>

</body>
</html>
